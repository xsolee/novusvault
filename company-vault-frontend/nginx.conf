server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static, content-hashed bundle assets can be cached aggressively.
    location /_expo/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Expo Router uses client-side navigation (web.output: "single"), so any
    # path that isn't a real file — including a direct load or refresh on a
    # deep route like /documents/123 — must fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
