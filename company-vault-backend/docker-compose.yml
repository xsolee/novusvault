services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  # One-shot: pulls both models, then sends one throwaway request per model so the
  # api/worker containers never hit a genuinely cold (unloaded-from-RAM) model on their
  # first real request. Mirrors the minio-init sidecar pattern this file used to have.
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      LLM_MODEL: ${OLLAMA_LLM_MODEL:-llama3.1:8b}
      EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        ollama pull "$$LLM_MODEL"
        ollama pull "$$EMBEDDING_MODEL"
        ollama run "$$LLM_MODEL" "hi" > /dev/null || true
        ollama run "$$EMBEDDING_MODEL" "hi" > /dev/null || true

  # Postgres (pgvector) and object storage are hosted on Supabase, not local containers —
  # DATABASE_URL and S3_* in .env point at the real Supabase project.
  migrate:
    build:
      context: .
      target: migrate
    env_file: .env

  api:
    build:
      context: .
      target: api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      target: worker
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully

volumes:
  ollama_data:
